name: Deploy na EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Copia os arquivos para EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "index.html,Dockerfile"
          target: "/home/ec2-user/"

      - name: Build e deploy com Docker
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo systemctl stop nginx || true
            sudo /usr/bin/docker build -t tramasul /home/ec2-user/
            sudo /usr/bin/docker stop tramasul-container || true
            sudo /usr/bin/docker rm tramasul-container || true
            sudo /usr/bin/docker run -d -p 80:80 --name tramasul-container tramasul
